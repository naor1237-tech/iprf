name: Deploy to GitHub Pages

# NOTE: GitHub Pages on a PRIVATE repo requires a paid plan. On the free
# plan, make the repository PUBLIC first, then either run this workflow
# manually (Actions tab → "Run workflow") or add a push trigger:
#   on:
#     push:
#       branches: [main]
# Until then this workflow is manual-only so it doesn't fail on every push.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
