<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&I Clinic - שיקום שיער IPRF</title>
    <meta name="description" content="דף נחיתה לטיפולי שיקום שיער בשיטת IPRF בקליניקה של לידור הלל וד''ר חאלד בגבעת אבני.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Babel for React JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom Styles -->
    <style>
      body { font-family: 'Assistant', sans-serif; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Heebo', sans-serif; }
      .gold-gradient { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
      .text-gold { color: #b38728; }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 3px; }
      
      /* Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fadeIn 0.5s ease-out; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fadeInUp 0.4s ease-out; }
      @keyframes bounceSlow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      .animate-bounce-slow { animation: bounceSlow 3s infinite ease-in-out; }
      @keyframes pulseSlow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      .animate-pulse-slow { animation: pulseSlow 2s infinite; }
    </style>

    <!-- Import Map for Modules -->
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@0.1.1",
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-icons/fa": "https://esm.sh/react-icons@4.10.1/fa?bundle"
      }
    }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <div id="root"></div>

    <!-- Main Application Logic -->
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { GoogleGenAI } from "@google/genai";
        import { 
            FaWhatsapp, FaPhone, FaMapMarkerAlt, FaSyringe, FaUserMd, 
            FaCheckCircle, FaRobot, FaTimes, FaArrowLeft, FaBars, FaStar, FaCrown 
        } from 'react-icons/fa';

        // --- CONFIGURATION ---
        // חשוב: החלף את המחרוזת למטה במפתח ה-API האמיתי שלך
        const API_KEY = "YOUR_API_KEY_HERE"; 
        
        const PHONE_NUMBER = "972585622862";
        const WHATSAPP_MESSAGE = "היי לידור, הגעתי דרך האתר. אשמח לשמוע פרטים נוספים על טיפול IPRF ולקבוע תור לאבחון.";
        const WHATSAPP_LINK = `https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent(WHATSAPP_MESSAGE)}`;
        const DEV_CREDIT_PHONE = "972535559343";
        const DEV_CREDIT_LINK = `https://wa.me/${DEV_CREDIT_PHONE}`;

        // --- IMAGES ---
        const USER_IMAGES = {
            handCheck: "https://i.imghippo.com/files/dly7716Uis.jpeg",
            thinning: "https://i.imghippo.com/files/Xk4447UoA.jpeg",
            result1: "https://i.imghippo.com/files/HDsX4684exQ.jpeg",
            result2: "https://i.imghippo.com/files/UBj7123YLA.jpeg",
            result3: "https://i.imghippo.com/files/dly7716Uis.jpeg"
        };

        const GALLERY_IMAGES = [
            { id: 1, url: USER_IMAGES.result1, label: 'שיקום מלא - לפני ואחרי', description: 'תוצאה מדהימה של צפיפות ומילוי' },
            { id: 2, url: USER_IMAGES.result2, label: 'מילוי האזור הקודקודי', description: 'עיבוי משמעותי של השערה וחידוש הצמיחה' },
            { id: 3, url: USER_IMAGES.result3, label: 'תהליך השיקום', description: 'שיפור בצפיפות ובבריאות השיער' },
        ];

        // --- GEMINI SERVICE ---
        const ai = new GoogleGenAI({ apiKey: API_KEY });
        const SYSTEM_INSTRUCTION = `
        אתה העוזר הוירטואלי החכם של קליניקת D&I (Hair Restoration Clinic).
        הקליניקה מנוהלת על ידי לידור הלל (מומחה עם 15 שנות ניסיון) וממוקמת בגבעת אבני, רחוב האלון 92.
        הטיפולים הרפואיים מבוצעים על ידי ד"ר חאלד.
        הנושא המרכזי הוא טיפול IPRF (Injectable Platelet Rich Fibrin) לשיקום שיער.

        מידע חשוב שעליך לדעת ולהשתמש בו בתשובותיך:
        1. IPRF הוא הדור החדש של PRP. הוא 100% טבעי, ללא חומרים משמרים או נוגדי קרישה.
        2. הטיפול מעודד צמיחת שיער, מעבה שיער קיים ומונע נשירה.
        3. הטיפול מתאים לגברים ונשים.
        4. החומר מופק מהדם של המטופל עצמו ולכן אין סכנת אלרגיה.
        5. תוצאות נראות לרוב לאחר מספר טיפולים (סדרה של 3-6 טיפולים).
        6. מספר הטלפון לקביעת תורים (לידור): 058-562-2862.

        הסגנון שלך צריך להיות: מקצועי, אדיב, משכנע ושיווקי אך אמין.
        תמיד תכוון את המשתמש לקבוע תור בוואטסאפ או להשאיר פרטים.
        תשובות קצרות ולעניין בעברית בלבד.
        `;

        const sendChatMessage = async (history, message) => {
            if (!API_KEY || API_KEY === "YOUR_API_KEY_HERE") {
                return "מערכת הצ'אט אינה זמינה כרגע (חסר מפתח API). אנא צור קשר בוואטסאפ.";
            }
            try {
                const chat = ai.chats.create({
                    model: 'gemini-2.5-flash',
                    config: {
                        systemInstruction: SYSTEM_INSTRUCTION,
                        temperature: 0.7,
                    },
                    history: history
                });
                const result = await chat.sendMessage({ message });
                return result.text || "מצטער, נתקלתי בבעיה. אנא נסה שנית או צור קשר בוואטסאפ.";
            } catch (error) {
                console.error("Gemini Chat Error:", error);
                return "אירעה שגיאה בתקשורת. אנא נסה שנית מאוחר יותר או פנה אלינו בוואטסאפ.";
            }
        };

        // --- COMPONENTS ---
        const BenefitCard = ({ icon, title, description }) => (
            <div className="bg-gray-50 p-8 rounded-[2rem] text-center hover:shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] transition duration-300 border border-transparent hover:border-[#b38728]/20 group h-full">
                <div className="flex justify-center mb-6 transform group-hover:scale-110 transition duration-300 drop-shadow-md">{icon}</div>
                <h3 className="text-xl font-bold text-gray-800 mb-4 group-hover:text-[#b38728] transition">{title}</h3>
                <p className="text-gray-600 leading-relaxed">{description}</p>
            </div>
        );

        const ProcessStep = ({ number, title, desc }) => (
            <div className="flex gap-6 items-start group">
                <div className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-[#b38728] to-transparent opacity-30 select-none font-sans leading-none transition group-hover:opacity-60">{number}</div>
                <div>
                    <h4 className="text-xl font-bold text-gray-900 mb-2 group-hover:text-[#b38728] transition">{title}</h4>
                    <p className="text-gray-600 leading-relaxed">{desc}</p>
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([
                { role: 'model', text: 'שלום! אני הנציג הדיגיטלי של לידור הלל וד"ר חאלד. איך אפשר לעזור לך בנושא שיקום השיער?' }
            ]);
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages, isChatOpen]);

            const handleSendMessage = async () => {
                if (!chatInput.trim()) return;

                const userMsg = chatInput;
                setChatMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setChatInput('');
                setIsTyping(true);

                const history = chatMessages.map(m => ({
                    role: m.role,
                    parts: [{ text: m.text }]
                }));

                const responseText = await sendChatMessage(history, userMsg);
                setChatMessages(prev => [...prev, { role: 'model', text: responseText }]);
                setIsTyping(false);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') handleSendMessage();
            };

            return (
                <div className="min-h-screen flex flex-col font-sans text-gray-800" dir="rtl">
                
                {/* --- Sticky Header --- */}
                <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-sm shadow-md border-b border-[#b38728]/20">
                    <div className="container mx-auto px-4 py-3 flex justify-between items-center">
                    <div className="flex items-center gap-2">
                        <div className="w-12 h-12 bg-black text-[#b38728] flex items-center justify-center rounded-full border-2 border-[#b38728] shadow-md relative">
                        <FaCrown className="text-xl" />
                        </div>
                        <div className="hidden md:block">
                        <h1 className="text-xl font-bold leading-none tracking-tight">D&I Clinic</h1>
                        <p className="text-xs text-gray-500 font-bold tracking-wide">לידור הלל & ד"ר חאלד</p>
                        </div>
                    </div>

                    <nav className="hidden md:flex gap-8 font-bold text-gray-700 text-sm tracking-wide">
                        {['אודות', 'השיטה', 'תוצאות', 'הקליניקה'].map((item, idx) => {
                        const href = ['#about', '#process', '#results', '#location'][idx];
                        return (
                            <a key={item} href={href} className="hover:text-[#b38728] transition relative group py-2">
                            {item}
                            <span className="absolute bottom-0 right-0 w-0 h-0.5 bg-[#b38728] transition-all duration-300 group-hover:w-full"></span>
                            </a>
                        );
                        })}
                    </nav>

                    <div className="flex items-center gap-3">
                        <a 
                        href={`tel:+${PHONE_NUMBER}`}
                        className="bg-gray-100 p-3 rounded-full text-gray-700 hover:bg-[#b38728] hover:text-white transition shadow-sm"
                        >
                        <FaPhone />
                        </a>
                        <a 
                        href={WHATSAPP_LINK}
                        target="_blank"
                        rel="noreferrer"
                        className="bg-[#25D366] text-white px-5 py-2.5 rounded-full font-bold flex items-center gap-2 hover:bg-[#128C7E] transition shadow-lg hover:shadow-green-300/50 transform hover:-translate-y-0.5"
                        >
                        <FaWhatsapp className="text-xl" />
                        <span className="hidden md:inline">תיאום תור</span>
                        </a>
                        <button 
                        className="md:hidden text-2xl text-gray-700 p-2"
                        onClick={() => setIsMenuOpen(!isMenuOpen)}
                        >
                        <FaBars />
                        </button>
                    </div>
                    </div>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                    <div className="md:hidden bg-white border-t p-4 flex flex-col gap-4 shadow-xl absolute w-full z-50">
                        {['אודות', 'השיטה', 'תוצאות', 'הקליניקה'].map((item, idx) => {
                        const href = ['#about', '#process', '#results', '#location'][idx];
                        return (
                            <a key={item} href={href} onClick={() => setIsMenuOpen(false)} className="font-semibold p-3 hover:bg-gray-50 rounded-lg text-gray-700 block border-b border-gray-100 last:border-0">
                            {item}
                            </a>
                        );
                        })}
                    </div>
                    )}
                </header>

                {/* --- Hero Section --- */}
                <section className="relative bg-[#0a0a0a] text-white overflow-hidden min-h-[90vh] flex items-center pt-10 pb-20 md:py-0">
                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-gray-800 via-[#0a0a0a] to-black"></div>
                    <div className="absolute top-1/4 right-0 w-[600px] h-[600px] bg-[#b38728] opacity-[0.08] blur-[150px] rounded-full"></div>
                    
                    <div className="relative container mx-auto px-4 flex flex-col md:flex-row items-center gap-12">
                    <div className="md:w-1/2 space-y-8 text-center md:text-right z-10 order-2 md:order-1">
                        <div className="inline-flex items-center gap-2 bg-[#b38728]/10 border border-[#b38728]/40 text-[#b38728] px-4 py-1.5 rounded-full text-sm font-bold animate-fade-in">
                        <FaStar className="text-xs" />
                        <span>15 שנות ניסיון ומומחיות</span>
                        </div>
                        
                        <h1 className="text-5xl md:text-7xl font-black leading-[1.1] tracking-tight drop-shadow-2xl">
                        השיער שלך,<br/>
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#bf953f] via-[#fcf6ba] to-[#b38728]">
                            הביטחון שלך.
                        </span>
                        </h1>
                        
                        <p className="text-xl md:text-2xl text-gray-400 max-w-xl mx-auto md:mx-0 leading-relaxed font-light">
                        טיפול <strong className="text-white font-bold">IPRF</strong> הביולוגי והמתקדם.
                        <br/>
                        בליווי אישי של <span className="text-white font-semibold">לידור הלל</span> ובביצוע רפואי של <span className="text-white font-semibold">ד"ר חאלד</span>.
                        </p>
                        
                        <div className="flex flex-col sm:flex-row gap-5 justify-center md:justify-start pt-6">
                        <a 
                            href={WHATSAPP_LINK}
                            target="_blank" 
                            rel="noreferrer"
                            className="gold-gradient text-gray-900 font-bold py-4 px-10 rounded-full shadow-[0_0_40px_rgba(179,135,40,0.3)] hover:shadow-[0_0_60px_rgba(179,135,40,0.5)] transition duration-300 transform hover:-translate-y-1 flex items-center justify-center gap-3 text-lg"
                        >
                            <FaWhatsapp className="text-2xl" />
                            אבחון חינם בוואטסאפ
                        </a>
                        <a href="#results" className="px-8 py-4 rounded-full border border-gray-700 text-gray-300 hover:bg-white/5 hover:border-white/30 transition font-semibold">
                            צפה בתוצאות
                        </a>
                        </div>
                    </div>
                    
                    <div className="md:w-1/2 flex justify-center z-10 relative order-1 md:order-2">
                        <div className="relative w-80 h-auto md:w-[500px]">
                            <div className="absolute -inset-4 border border-[#b38728]/30 rounded-[2rem] transform rotate-3"></div>
                            <div className="absolute -inset-4 border border-[#b38728]/10 rounded-[2rem] transform -rotate-3 scale-105"></div>
                            
                            <img 
                            src={USER_IMAGES.handCheck} 
                            alt="בדיקת צפיפות שיער בקליניקה - לידור הלל וד''ר חאלד" 
                            className="w-full h-auto object-contain rounded-[2rem] shadow-2xl relative z-10 border border-gray-800"
                            />
                            
                            <div className="absolute -bottom-8 -right-4 md:-right-8 bg-white/10 backdrop-blur-xl border border-white/20 p-4 rounded-2xl shadow-2xl z-20 flex items-center gap-4 animate-bounce-slow max-w-[200px]">
                            <div className="bg-gradient-to-br from-[#b38728] to-[#9c7522] p-3 rounded-xl text-white shadow-lg">
                                <FaUserMd className="text-2xl" />
                            </div>
                            <div className="text-right">
                                <div className="text-white font-bold text-sm">מבוצע ע"י רופא</div>
                                <div className="text-gray-300 text-xs">ד"ר חאלד</div>
                            </div>
                            </div>
                        </div>
                    </div>
                    </div>
                </section>

                {/* --- What is IPRF? --- */}
                <section id="about" className="py-24 bg-white relative overflow-hidden">
                    <div className="container mx-auto px-4 relative z-10">
                    <div className="text-center mb-16 max-w-3xl mx-auto">
                        <h2 className="text-4xl md:text-5xl font-bold text-gray-900 mb-6">למה דווקא IPRF?</h2>
                        <div className="w-24 h-1.5 bg-[#b38728] mx-auto rounded-full"></div>
                        <p className="mt-8 text-xl text-gray-600 leading-relaxed">
                        הטכנולוגיה שמשנה את כללי המשחק. 
                        <strong> IPRF</strong> (Injectable Platelet Rich Fibrin) הוא הדור המתקדם של טיפולי השיער. 
                        פיברין עשיר בטסיות המופק מדמך ומעודד צמיחה מחודשת בצורה טבעית ועוצמתית.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        <BenefitCard 
                        icon={<FaCheckCircle className="text-5xl text-[#b38728]" />}
                        title="100% טבעי ללא כימיקלים"
                        description="החומר מופק מהדם של המטופל בלבד. ללא חומרים משמרים וללא נוגדי קרישה. בטיחות מקסימלית."
                        />
                        <BenefitCard 
                        icon={<FaSyringe className="text-5xl text-[#b38728]" />}
                        title="אפקטיביות כפולה"
                        description="מבנה הפיברין מאפשר שחרור איטי ומבוקר של גורמי גדילה לאורך זמן, מה שמבטיח גירוי מתמשך לזקיק."
                        />
                        <BenefitCard 
                        icon={<FaUserMd className="text-5xl text-[#b38728]" />}
                        title="חזרה מיידית לשגרה"
                        description="טיפול קצר, ממוקד וללא זמן החלמה. מתאים לגברים ונשים כאחד."
                        />
                    </div>
                    </div>
                </section>

                {/* --- Process Section --- */}
                <section id="process" className="py-24 bg-gray-50 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-1/3 h-full bg-[#b38728]/5 skew-x-12 transform origin-top"></div>

                    <div className="container mx-auto px-4 flex flex-col md:flex-row items-center gap-16 relative z-10">
                    <div className="md:w-1/2">
                        <div className="relative group">
                        <div className="absolute -inset-2 bg-gradient-to-tr from-[#b38728] to-transparent rounded-2xl opacity-30 group-hover:opacity-50 transition duration-500"></div>
                        <img 
                            src={USER_IMAGES.thinning} 
                            alt="אבחון התקרחות ושיער דליל" 
                            className="rounded-2xl shadow-2xl w-full object-cover relative transform transition duration-500 group-hover:scale-[1.01]"
                        />
                        <div className="absolute bottom-6 right-6 bg-white/95 backdrop-blur px-6 py-3 rounded-xl shadow-xl border-r-4 border-[#b38728]">
                            <div className="font-bold text-gray-900">לפני הטיפול</div>
                            <div className="text-xs text-gray-500">זיהוי אזורים דלילים</div>
                        </div>
                        </div>
                    </div>
                    
                    <div className="md:w-1/2 space-y-10">
                        <div>
                        <h2 className="text-4xl font-bold text-gray-900 mb-3">איך עובד התהליך?</h2>
                        <p className="text-gray-500 text-lg">שלושה שלבים פשוטים בדרך לשיער מלא</p>
                        </div>
                        
                        <div className="space-y-8">
                        <ProcessStep 
                            number="01" 
                            title="לקיחת דם וסרכוז" 
                            desc="תהליך מהיר ופשוט (כמו בדיקת דם רגילה), וסרכוז בצנטריפוגה מתקדמת." 
                        />
                        <ProcessStep 
                            number="02" 
                            title="הפקת ה-IPRF" 
                            desc="בידוד שכבת הפיברין העשירה בגורמי גדילה בריכוז מקסימלי." 
                        />
                        <ProcessStep 
                            number="03" 
                            title="הזרקה ממוקדת" 
                            desc="הרופא מזריק את החומר ישירות לשורשי השיער באזורים הדלילים לעידוד צמיחה." 
                        />
                        </div>
                    </div>
                    </div>
                </section>

                {/* --- Results Gallery --- */}
                <section id="results" className="py-24 bg-[#111] text-white relative">
                    <div className="container mx-auto px-4 text-center relative z-10">
                    <h2 className="text-4xl md:text-5xl font-bold mb-4 text-[#fcf6ba]">תוצאות מוכחות</h2>
                    <p className="text-gray-400 mb-12 max-w-2xl mx-auto text-lg">
                        גלריית המטופלים שלנו. ללא פילטרים, ללא עריכה. רק תוצאות אמיתיות של שיקום ועיבוי.
                    </p>

                    <div className="grid md:grid-cols-3 gap-8">
                        {GALLERY_IMAGES.map((img, index) => (
                        <div key={img.id} className="group bg-gray-800 rounded-2xl overflow-hidden shadow-2xl border border-gray-700 hover:border-[#b38728] transition duration-300">
                            <div className="aspect-[4/5] overflow-hidden relative">
                            <img 
                                src={img.url} 
                                alt={img.label} 
                                className="w-full h-full object-cover transform group-hover:scale-105 transition duration-700"
                            />
                            <div className="absolute top-4 right-4 bg-black/60 backdrop-blur px-3 py-1 rounded text-xs font-bold text-[#b38728] border border-[#b38728]/30">
                                מקרה {index + 1}
                            </div>
                            </div>
                            <div className="p-6 text-right bg-gradient-to-b from-gray-800 to-gray-900">
                            <h3 className="font-bold text-xl mb-2 text-white group-hover:text-[#b38728] transition">{img.label}</h3>
                            <p className="text-gray-400 text-sm">{img.description}</p>
                            </div>
                        </div>
                        ))}
                    </div>

                    <div className="mt-16 bg-gradient-to-r from-[#b38728] to-[#9c7522] rounded-2xl p-1 max-w-4xl mx-auto shadow-2xl">
                        <div className="bg-[#1a1a1a] rounded-xl p-8 flex flex-col md:flex-row items-center justify-between gap-8 h-full">
                        <div className="text-right">
                            <h3 className="text-2xl font-bold text-white mb-2">רוצה לדעת אם הטיפול מתאים לך?</h3>
                            <p className="text-gray-400">שלח לנו תמונה של אזור השיער בוואטסאפ וקבל הערכה ראשונית חינם.</p>
                        </div>
                        <a 
                            href={WHATSAPP_LINK}
                            className="bg-white text-[#b38728] font-bold py-3 px-8 rounded-full shadow-lg hover:bg-gray-100 transition whitespace-nowrap flex items-center gap-2"
                        >
                            <FaWhatsapp />
                            שלח תמונה עכשיו
                        </a>
                        </div>
                    </div>
                    </div>
                </section>

                {/* --- Location Section (Text Focused - No Images) --- */}
                <section id="location" className="py-24 bg-white relative">
                    <div className="container mx-auto px-4">
                    <div className="max-w-3xl mx-auto text-center space-y-8">
                        <h2 className="text-4xl font-bold text-gray-900">מחכים לך בקליניקה</h2>
                        <div className="w-20 h-1 bg-[#b38728] mx-auto rounded-full"></div>
                        
                        <div className="bg-gray-50 rounded-3xl p-10 shadow-lg border border-gray-100 space-y-8">
                            <div className="flex flex-col md:flex-row justify-center gap-8 md:gap-16 text-right md:text-center">
                                <div className="space-y-2">
                                    <div className="flex items-center md:justify-center gap-2 text-[#b38728] font-bold text-xl">
                                        <FaUserMd />
                                        <h3>צוות מטפל</h3>
                                    </div>
                                    <p className="text-gray-600 text-lg">ד"ר חאלד & לידור הלל</p>
                                </div>
                                <div className="space-y-2">
                                    <div className="flex items-center md:justify-center gap-2 text-[#b38728] font-bold text-xl">
                                        <FaMapMarkerAlt />
                                        <h3>כתובת</h3>
                                    </div>
                                    <p className="text-gray-600 text-lg">רחוב האלון 92, גבעת אבני</p>
                                </div>
                            </div>

                            <div className="pt-4 border-t border-gray-200">
                            <a 
                                href={`waze://?q=${encodeURIComponent('לידור הלל גבעת אבני')}`} 
                                className="inline-flex items-center gap-2 bg-blue-600 text-white px-8 py-3 rounded-full hover:bg-blue-700 transition font-bold shadow-md"
                            >
                                <FaMapMarkerAlt />
                                נווט לקליניקה ב-Waze
                            </a>
                            </div>
                        </div>
                    </div>
                    </div>
                </section>

                {/* --- Footer --- */}
                <footer className="bg-black text-gray-400 py-12 border-t border-gray-900">
                    <div className="container mx-auto px-4 text-center">
                    <div className="w-16 h-16 bg-[#b38728] text-white flex items-center justify-center font-black rounded-full mx-auto mb-6 text-xl shadow-[0_0_20px_rgba(179,135,40,0.4)]">D&I</div>
                    <h4 className="text-white font-bold text-2xl mb-2">D&I Clinic</h4>
                    <p className="mb-8 text-gray-500">המומחים לשיקום שיער בשיטת IPRF</p>
                    
                    <div className="flex justify-center gap-8 mb-8">
                        <a href={WHATSAPP_LINK} className="text-3xl hover:text-[#25D366] transition transform hover:scale-110"><FaWhatsapp /></a>
                        <a href={`tel:+${PHONE_NUMBER}`} className="text-3xl hover:text-blue-400 transition transform hover:scale-110"><FaPhone /></a>
                    </div>
                    
                    <div className="text-xs border-t border-gray-900 pt-8 text-gray-600 flex flex-col items-center gap-1">
                        <p>&copy; {new Date().getFullYear()} D&I Clinic. כל הזכויות שמורות.</p>
                        <a href={DEV_CREDIT_LINK} target="_blank" rel="noreferrer" className="hover:text-[#b38728] transition font-bold mt-2">
                        נוצר ע״י הלל דיגיטל
                        </a>
                    </div>
                    </div>
                </footer>

                {/* --- Floating Action Buttons --- */}
                <div className="fixed bottom-6 left-6 z-40 flex flex-col gap-4">
                    <button 
                    onClick={() => setIsChatOpen(!isChatOpen)}
                    className="bg-blue-600 text-white p-4 rounded-full shadow-2xl hover:bg-blue-700 transition transform hover:scale-110 flex items-center justify-center relative group border-2 border-white/20"
                    >
                    <FaRobot className="text-2xl" />
                    <span className="absolute left-full ml-3 bg-gray-900 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none shadow-xl">
                        שאלות? אני כאן
                    </span>
                    </button>

                    <a 
                    href={WHATSAPP_LINK}
                    target="_blank"
                    rel="noreferrer"
                    className="bg-[#25D366] text-white p-4 rounded-full shadow-[0_0_20px_rgba(37,211,102,0.5)] hover:bg-[#128C7E] transition transform hover:scale-110 flex items-center justify-center relative group border-2 border-white/20 animate-pulse-slow"
                    >
                    <FaWhatsapp className="text-3xl" />
                    <span className="absolute left-full ml-3 bg-gray-900 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none shadow-xl">
                        קביעת תור מהירה
                    </span>
                    </a>
                </div>

                {/* --- Chat Window --- */}
                {isChatOpen && (
                    <div className="fixed bottom-24 left-6 z-50 w-80 md:w-96 bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden max-h-[500px] animate-fade-in-up">
                    <div className="bg-gray-900 text-white p-4 flex justify-between items-center shadow-md">
                        <div className="flex items-center gap-3">
                        <div className="bg-[#b38728] p-2 rounded-full shadow-inner"><FaRobot className="text-white text-lg" /></div>
                        <div>
                            <div className="font-bold text-sm">D&I AI Assistant</div>
                            <div className="text-[10px] text-gray-300 flex items-center gap-1.5"><span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> מחובר</div>
                        </div>
                        </div>
                        <button onClick={() => setIsChatOpen(false)} className="hover:text-red-400 transition bg-white/10 p-1.5 rounded-full"><FaTimes /></button>
                    </div>
                    
                    <div className="flex-1 p-4 overflow-y-auto bg-gray-50 space-y-4 scrollbar-thin scrollbar-thumb-gray-300">
                        {chatMessages.map((msg, idx) => (
                        <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'}`}>
                            <div className={`max-w-[85%] p-3.5 rounded-2xl text-sm leading-relaxed ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-md' : 'bg-white border border-gray-100 text-gray-800 rounded-bl-none shadow-sm'}`}>
                            {msg.text}
                            </div>
                        </div>
                        ))}
                        {isTyping && (
                        <div className="flex justify-end">
                            <div className="bg-white border px-4 py-2 rounded-full text-xs shadow-sm text-gray-400 flex gap-1">
                            <span className="animate-bounce">.</span><span className="animate-bounce delay-100">.</span><span className="animate-bounce delay-200">.</span>
                            </div>
                        </div>
                        )}
                        <div ref={chatEndRef} />
                    </div>

                    <div className="p-3 bg-white border-t flex gap-2">
                        <input 
                        type="text" 
                        className="flex-1 bg-gray-100 border-0 rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#b38728]/50 transition shadow-inner"
                        placeholder="שאל שאלה..."
                        value={chatInput}
                        onChange={(e) => setChatInput(e.target.value)}
                        onKeyDown={handleKeyPress}
                        />
                        <button 
                        onClick={handleSendMessage}
                        className="bg-[#b38728] text-white w-11 h-11 flex items-center justify-center rounded-full hover:bg-[#9c7522] transition shadow-lg transform active:scale-95"
                        >
                        <FaArrowLeft className="rotate-180 transform" />
                        </button>
                    </div>
                    </div>
                )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
